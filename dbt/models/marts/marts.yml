version: 2

models:
  - name: fct_crypto_latest_prices
    description: > 
      Fact table containing the most recent pricing metrics per asset. 
      This table follows a Star Schema design, storing only measures and foreign keys 
      to optimize storage and maintainability.
    columns:
      - name: ASSET_ID
        description: "Foreign key (FK) linking to dim_assets. grain: one record per asset."
        tests:
          - not_null
          - relationships:
              to: ref('dim_assets')
              field: asset_id

      - name: DATE_KEY
        description: "Foreign key (FK) linking to the dynamic dim_date dimension (YYYYMMDD)."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: PRICE_USD
        description: "Asset price measure in USD. Cast to NUMBER(18,8) for financial precision."
        tests:
          - not_null

      - name: PROCESSED_AT
        description: "Event timestamp indicating the specific ingestion time."
        tests:
          - not_null